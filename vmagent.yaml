global:
  scrape_interval: 15s

scrape_configs:
  - job_name: keycloak
    # Derive environment label from the running Coolify container label.
    metrics_path: /metrics
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        regex: keycloak
        action: keep
      - target_label: __address__
        replacement: "%{KEYCLOAK_METRICS_TARGET}"
      - source_labels: [__meta_docker_container_label_coolify_environmentName]
        target_label: environment
      - target_label: namespace
        replacement: keycloak
      - target_label: pod
        replacement: keycloak
      - target_label: container
        replacement: keycloak

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis
    relabel_configs:
      - target_label: namespace
        replacement: redis
      - target_label: instance
        replacement: redis-exporter:9121
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: postgres
    # Optional Basic Auth for protected Prometheus endpoints.
    basic_auth:
      username: "%{PROMETHEUS_USERNAME}"
      password: "%{PROMETHEUS_PASSWORD}"
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        regex: postgres-exporter
        action: keep
      - target_label: __address__
        replacement: postgres-exporter:9187
      - source_labels: [__meta_docker_container_label_coolify_environmentName]
        target_label: environment
      - target_label: namespace
        replacement: postgres
      - target_label: instance
        replacement: postgres-exporter:9187
    metric_relabel_configs:
      # Ubicloud-pushed postgres metrics → production
      - if: '{ubicloud_resource_id!=""}'
        target_label: environment
        replacement: production

  - job_name: inveniordm
    # Scrapes the InvenioRDM prometheus-flask-exporter metrics endpoint.
    # Set INVENIO_METRICS_TARGET (e.g. inveniordm-*:5000) in Coolify UI.
    # Derive environment label from the running Coolify container label.
    metrics_path: /api/metrics
    scheme: http
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        regex: inveniordm
        action: keep
      - source_labels: [__meta_docker_container_label_coolify_environmentName]
        target_label: environment
      - target_label: job
        replacement: inveniordm
      - target_label: namespace
        replacement: inveniordm

  - job_name: opensearch
    relabel_configs:
      - target_label: namespace
        replacement: opensearch
      - target_label: instance
        replacement: opensearch-exporter:9114
    static_configs:
      - targets:
          - "%{OPENSEARCH_EXPORTER_TARGET}"

  - job_name: traefik
    static_configs:
      - targets:
          - coolify-proxy:9101

  - job_name: inveniordm_probe
    # HTTP probe of the InvenioRDM /ping health endpoint via blackbox-exporter.
    metrics_path: /probe
    params:
      module: [http_2xx]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - target_label: job
        replacement: inveniordm
      - target_label: environment
        replacement: production
    static_configs:
      - targets:
          - "http://%{INVENIO_METRICS_TARGET}/ping"

  - job_name: inveniordm_status
    # Protected endpoint on status.front-matter.de.
    # Scraped target is fixed to status.front-matter.de.
    # STATUS_METRICS_TARGET selects which monitor_name value to rewrite.
    # - STATUS_METRICS_API_KEY
    basic_auth:
      # vmagent requires non-empty basic_auth.username.
      # Uptime Kuma accepts arbitrary username with API key as password.
      username: "api"
      password: "%{STATUS_METRICS_API_KEY}"
    metrics_path: /metrics
    scheme: https
    relabel_configs:
      - target_label: namespace
        replacement: status
      - target_label: job
        replacement: front-matter-status
      - target_label: environment
        replacement: production
    metric_relabel_configs:
      - source_labels: [monitor_name]
        regex: "%{STATUS_METRICS_TARGET}"
        target_label: monitor_name
        replacement: InvenioRDM
        action: replace
      - source_labels: [monitor_name]
        regex: InvenioRDM
        action: keep
    static_configs:
      - targets:
          - status.front-matter.de

  - job_name: celery
    # Derive environment label from the running Coolify container label.
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
    relabel_configs:
      - source_labels:
          [__meta_docker_container_label_com_docker_compose_service]
        regex: celery-exporter
        action: keep
      - target_label: __address__
        replacement: "%{CELERY_EXPORTER_TARGET}"
      - source_labels: [__meta_docker_container_label_coolify_environmentName]
        target_label: environment
      - target_label: namespace
        replacement: celery
