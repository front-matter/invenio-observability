# stored under /data/coolify/services/vector

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.docker_logs]
type = "docker_logs"

# Explicitly set the Docker endpoint. This avoids surprises if the runtime
# injects a `DOCKER_HOST` env var pointing elsewhere.
#
# If you run rootless Docker, change this to your user socket, e.g.
# `unix:///run/user/1000/docker.sock`, and mount that socket into the Vector
# container.
docker_host = "unix:///var/run/docker.sock"

# Exclude sidecars and this observability stack itself.
exclude_containers = [
  # NOTE: `exclude_containers` uses prefix matching (not glob patterns).
  # Excluding "sidecar" is useful when sidecars are named like "sidecar-...".
  "sidecar",
  "/sidecar",
  "vector",
  "/vector",
  "vector-",
  "/vector-",
  "loki",
  "/loki",
  "loki-",
  "/loki-",
  "grafana",
  "/grafana",
  "grafana-",
  "/grafana-",
]

# Reduce noise: only collect logs for the relevant workloads.
# NOTE: `include_containers` uses prefix matching. If set, only matching
# containers are collected (unless excluded above).
include_containers = [
  "web-",
  "/web-",
  "worker-",
  "/worker-",
  "coolify-proxy",
  "/coolify-proxy",
  "opensearch-",
  "/opensearch-",
  "valkey-",
  "/valkey-",
  "redis-",
  "/redis-",
  "postgres-",
  "/postgres-",
  "keycloak-",
  "/keycloak-",
]

# IMPORTANT: `include_labels` on `docker_logs` is a *container filter* (expects
# `key=value` matches). It is NOT a “keep only these labels” allow-list.
#
# To avoid accidentally filtering out all containers (and getting 0 events), we
# do not set `include_labels` here. We prune `.container_labels` later in VRL
# instead.

# Merge Docker partial log frames automatically.
auto_partial_merge = true

# Multiline handling (example: lines start with an ISO date).
multiline.start_pattern = '^\d{4}-\d{2}-\d{2}'
multiline.mode = "halt_before"
multiline.condition_pattern = '^\d{4}-\d{2}-\d{2}'
multiline.timeout_ms = 1000

[sources.internal_metrics]
type = "internal_metrics"

[transforms.keep_invenio_infra]
type = "filter"
inputs = ["docker_logs"]
condition = '''
container_name = string!(.container_name)
container_lc = downcase(replace(container_name, "/", ""))
image_raw = ""
if is_string(.container_image) { image_raw = .container_image }
if image_raw == "" && is_string(.image) { image_raw = .image }
if image_raw == "" && is_object(.container) && is_string(.container.image) { image_raw = .container.image }
if image_raw == "" && is_object(.docker) && is_string(.docker.image) { image_raw = .docker.image }

image_lc = downcase(string!(image_raw))

starts_with(container_lc, "web-") || starts_with(container_lc, "worker-") || container_lc == "coolify-proxy" || starts_with(container_lc, "opensearch-") || contains(image_lc, "opensearch") || starts_with(container_lc, "valkey-") || contains(image_lc, "valkey") || contains(image_lc, "redis") || contains(image_lc, "postgres") || starts_with(container_lc, "keycloak-") || contains(image_lc, "keycloak")
'''

[transforms.normalize]
type = "remap"
inputs = ["keep_invenio_infra"]

source = '''
container_name = string!(.container_name)
.container = replace(container_name, "/", "")

# Keep only selected Docker labels to control label cardinality.
# NOTE: Depending on the runtime (e.g. Coolify), labels may be exposed as
# `.label` instead of `.container_labels`.
labels_src = {}
if is_object(.container_labels) && (length(.container_labels) ?? 0) > 0 {
	labels_src = .container_labels
} else if is_object(.label) && (length(.label) ?? 0) > 0 {
	labels_src = .label
}

labels_out = {}
if is_object(labels_src) {
	labels_out."com.docker.compose.service" = labels_src."com.docker.compose.service"
	labels_out."com.docker.compose.project" = labels_src."com.docker.compose.project"
	labels_out."coolify.projectName" = labels_src."coolify.projectName"
	labels_out."coolify.environmentName" = labels_src."coolify.environmentName"
	labels_out."environment" = labels_src."environment"
	labels_out."observability.environment" = labels_src."observability.environment"
	labels_out."observability.env" = labels_src."observability.env"
	labels_out."env" = labels_src."env"
}
.container_labels = labels_out

compose_service = .container_labels."com.docker.compose.service"
.service = if is_null(compose_service) { .container } else { compose_service }

compose_project = .container_labels."com.docker.compose.project"
coolify_project = .container_labels."coolify.projectName"
.project = if !is_null(compose_project) { compose_project } else { coolify_project }

stream_value = .stream
.stream = if is_null(stream_value) { "stdout" } else { stream_value }

# Environment labeling (recommended): set a Docker label per service/container.
# Examples (choose one convention and keep it consistent):
#   environment=production
#   environment=staging
#   observability.environment=production
#   observability.env=production
env_value = .container_labels."environment"
if is_null(env_value) { env_value = .container_labels."observability.environment" }
if is_null(env_value) { env_value = .container_labels."observability.env" }
if is_null(env_value) { env_value = .container_labels."env" }
if is_null(env_value) { env_value = .container_labels."coolify.environmentName" }

env_raw = ""
if is_string(env_value) { env_raw = downcase(string!(env_value)) }

.environment = if env_raw == "prod" || env_raw == "production" {
	"production"
} else if env_raw == "stage" || env_raw == "staging" {
	"staging"
} else {
	"unknown"
}

# Classify infrastructure components with low label cardinality.
# This helps filtering logs for Redis/Valkey, OpenSearch and Postgres even when
# they run as separate services/containers.
service_lc = downcase(string!(.service))

image_raw = ""
if is_string(.container_image) { image_raw = .container_image }
if image_raw == "" && is_string(.image) { image_raw = .image }
if image_raw == "" && is_object(.container) && is_string(.container.image) { image_raw = .container.image }
if image_raw == "" && is_object(.docker) && is_string(.docker.image) { image_raw = .docker.image }

image_lc = downcase(string!(image_raw))
container_lc = downcase(.container)

.component = if contains(service_lc, "traefik") || contains(image_lc, "traefik") || service_lc == "coolify-proxy" || container_lc == "coolify-proxy" {
	"traefik"
} else if contains(service_lc, "redis") || contains(service_lc, "valkey") || starts_with(container_lc, "redis-") || starts_with(container_lc, "valkey-") || contains(image_lc, "redis") || contains(image_lc, "valkey") {
	"redis"
} else if contains(service_lc, "opensearch") || starts_with(container_lc, "opensearch-") || contains(image_lc, "opensearch") {
	"opensearch"
} else if contains(service_lc, "postgres") || starts_with(container_lc, "postgres-") || contains(image_lc, "postgres") {
	"postgres"
} else if service_lc == "keycloak" || starts_with(container_lc, "keycloak-") || contains(image_lc, "keycloak") {
	"keycloak"
} else if starts_with(container_lc, "web-") {
	"inveniordm-web"
} else if starts_with(container_lc, "worker-") {
	"inveniordm-worker"
} else {
	"other"
}

# Detect log level (low cardinality). Works for common formats:
# - Traefik: level=info
# - OpenSearch: [..][INFO ]
# - Postgres: FATAL:, ERROR:, WARNING:
# - JSON logs: {"level":"info"}
msg = if is_string(.message) {
	.message
} else if is_string(.log) {
	.log
} else {
	""
}
level_raw = null

# Parse common HTTP access logs (combined format) to structured fields.
# Example:
# 172.18.0.2 - - [07/Mar/2026:13:00:41 +0000] "GET /static/favicon.ico HTTP/1.1" 200 0 "https://example.org/" "Mozilla/5.0 ..."
if msg != "" && .component == "inveniordm-web" {
	access = parse_regex(msg, r'^\S+\s+\S+\s+\S+\s+\[[^\]]+\]\s+"(?P<method>[A-Z]+)\s+(?P<target>[^\s]+)\s+HTTP\/(?P<httpver>[^\"]+)"\s+(?P<status>\d{3})\s+(?P<bytes>\d+|-)\s+"(?P<referer>[^\"]*)"\s+"(?P<ua>[^\"]*)"') ?? null
	if access != null {
		# Method / status / referer / UA
		if !exists(.http_method) || is_null(.http_method) || (is_string(.http_method) && string!(.http_method) == "") {
			.http_method = downcase(string!(access.method))
		}
		status_code = to_int(access.status) ?? null
		if !is_null(status_code) {
			.http_status = status_code
		}
		if (!exists(.http_target) || is_null(.http_target) || (is_string(.http_target) && string!(.http_target) == "")) {
			.http_target = string!(access.target)
		}
		referer_raw = string!(access.referer)
		if referer_raw != "" && referer_raw != "-" {
			.http_referer = referer_raw
		}
		ua_raw = string!(access.ua)
		if (!exists(.user_agent) || is_null(.user_agent) || (is_string(.user_agent) && string!(.user_agent) == "")) {
			if ua_raw != "" && ua_raw != "-" {
				.user_agent = ua_raw
			}
		}

		# For dashboards, treat "url" as the request path (target), not the referer.
		if (!exists(.http_url) || is_null(.http_url) || (is_string(.http_url) && string!(.http_url) == "")) {
			if exists(.http_target) && is_string(.http_target) {
				.http_url = .http_target
			} else if exists(.http_referer) && is_string(.http_referer) {
				.http_url = .http_referer
			}
		}
	}
}

# Extract optional user-agent from common HTTP access log lines, e.g.
# 172.18.0.2 - - [..] "GET / HTTP/1.1" 200 26402 "-" "SentryUptimeBot/1.0 ..."
# Keep it as a field (not a Loki label) to avoid label-cardinality explosion.
if (!exists(.user_agent) || is_null(.user_agent) || (is_string(.user_agent) && string!(.user_agent) == "")) && msg != "" && .component == "inveniordm-web" {
	ua_match = parse_regex(msg, r'"[A-Z]+\s+[^\s]+\s+HTTP\/[^\"]+"\s+\d{3}\s+\d+\s+"[^\"]*"\s+"(?P<ua>[^\"]*)"\s*$') ?? null
	if ua_match != null {
		ua_raw = string!(ua_match.ua)
		if ua_raw != "" && ua_raw != "-" {
			.user_agent = ua_raw
		}
	}
}

# Extract HTTP verb from access logs (GET/POST/PUT/...), normalized to lowercase.
if (!exists(.http_method) || is_null(.http_method) || (is_string(.http_method) && string!(.http_method) == "")) && msg != "" && .component == "inveniordm-web" {
	method_match = parse_regex(msg, r'"(?P<method>[A-Z]+)\s+[^\s]+\s+HTTP\/[^\"]+"') ?? null
	if method_match != null {
		.http_method = downcase(string!(method_match.method))
	}
}

# Truncate user-agent for dashboard display.
if .component == "inveniordm-web" && exists(.user_agent) && is_string(.user_agent) {
	ua_full = string!(.user_agent)
	if ua_full != "" {
		ua_short_match = parse_regex(ua_full, r'^(?P<ua>.{0,40})') ?? null
		if ua_short_match != null {
			.user_agent_short = string!(ua_short_match.ua)
		}
	}
}

if is_string(.level) {
	level_raw = .level
} else if is_object(.log) && is_string(.log.level) {
	level_raw = .log.level
} else {
	parsed = parse_regex(msg, r'(?i)\blevel=(?P<level>trace|debug|info|warn|warning|error|fatal|panic)\b') ?? null
	if parsed != null {
		level_raw = parsed.level
	} else {
		parsed = parse_regex(msg, r'(?i)^\[[^\]]+\]\[(?P<level>trace|debug|info|warn|warning|error|fatal)\s*\]') ?? null
		if parsed != null {
			level_raw = parsed.level
		} else {
			parsed = parse_regex(msg, r'(?i)\b(?P<level>log|info|notice|warning|error|fatal|panic):') ?? null
			if parsed != null {
				level_raw = parsed.level
			}
		}
	}
}

level_norm = ""
if is_string(level_raw) { level_norm = downcase(string!(level_raw)) }
.severity = if level_norm == "warning" || level_norm == "warn" {
	"warn"
} else if level_norm == "notice" {
	"info"
} else if level_norm == "err" || level_norm == "error" {
	"error"
} else if level_norm == "crit" || level_norm == "critical" || level_norm == "alert" || level_norm == "emerg" {
	"fatal"
} else if level_norm == "panic" {
	"fatal"
} else if level_norm == "trace" || level_norm == "debug" || level_norm == "info" || level_norm == "error" || level_norm == "fatal" {
	level_norm
} else {
	"unknown"
}

# Access logs often don't contain an explicit level; infer it from HTTP status.
if .severity == "unknown" && .component == "inveniordm-web" {
	status_code = null
	if exists(.http_status) {
		status_code = to_int(.http_status) ?? null
	} else {
		status_match = parse_regex(msg, r'"\s+(?P<status>\d{3})\s+') ?? null
		if status_match != null {
			status_code = to_int(status_match.status) ?? null
			if !is_null(status_code) { .http_status = status_code }
		}
	}
	if !is_null(status_code) {
		status_code_int = to_int(status_code)
		.severity = if status_code_int >= 500 {
			"error"
		} else if status_code_int >= 400 {
			"warn"
		} else if status_code_int > 0 {
			"info"
		} else {
			"unknown"
		}
	}
}

# Prevent Grafana from applying special log-level styling based on a JSON field
# named `level`. We keep the computed value in `.severity` instead.
if exists(.level) { del(.level) }

# Default: use Compose project name when available
app_raw = .project
.app = if is_string(app_raw) && app_raw != "" {
	app_raw
} else {
	"invenio-rdm"
}
'''

[sinks.loki]
type = "loki"
inputs = ["normalize"]
endpoint = "http://loki:3100"
encoding.codec = "json"
encoding.except_fields = ["severity"]

[sinks.prometheus_exporter]
type = "prometheus_exporter"
inputs = ["internal_metrics"]
address = "127.0.0.1:9598"

[sinks.loki.labels]
app = "{{ app }}"
component = "{{ component }}"
environment = "{{ environment }}"
log_level = "{{ severity }}"
service = "{{ service }}"
container = "{{ container }}"
stream = "{{ stream }}"
