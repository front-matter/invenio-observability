global:
  scrape_interval: 15s

scrape_configs:
  - job_name: keycloak
    # Target is configured via KEYCLOAK_METRICS_TARGET env var on the vmagent container
    metrics_path: /metrics
    relabel_configs:
      - target_label: namespace
        replacement: keycloak
      - target_label: pod
        replacement: keycloak
      - target_label: container
        replacement: keycloak
    static_configs:
      - targets:
          - "%{KEYCLOAK_METRICS_TARGET}"

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis
    relabel_configs:
      - target_label: namespace
        replacement: redis
      - target_label: instance
        replacement: redis-exporter:9121
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: postgres
    relabel_configs:
      - target_label: namespace
        replacement: postgres
      - target_label: instance
        replacement: postgres-exporter:9187
      - target_label: environment
        replacement: staging
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: inveniordm
    # Scrapes the InvenioRDM prometheus-flask-exporter metrics endpoint.
    # Set INVENIO_METRICS_TARGET (e.g. inveniordm-*:5000)
    # in Coolify UI.
    metrics_path: /api/metrics
    scheme: http
    relabel_configs:
      - target_label: job
        replacement: inveniordm
      - target_label: namespace
        replacement: inveniordm
      - target_label: environment
        replacement: production
    static_configs:
      - targets:
          - "%{INVENIO_METRICS_TARGET}"

  - job_name: opensearch
    relabel_configs:
      - target_label: namespace
        replacement: opensearch
      - target_label: instance
        replacement: opensearch-exporter:9114
    static_configs:
      - targets:
          - "%{OPENSEARCH_EXPORTER_TARGET}"

  - job_name: traefik
    static_configs:
      - targets:
          - coolify-proxy:9101

  - job_name: celery
    relabel_configs:
      - target_label: namespace
        replacement: celery
    static_configs:
      - targets:
          - "%{CELERY_EXPORTER_TARGET}"
