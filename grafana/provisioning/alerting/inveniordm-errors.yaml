apiVersion: 1

groups:
  - orgId: 1
    name: invenio-log-alerts
    # NOTE: `folder` is a *folder UID*, not the display name.
    # Use the default folder UID so provisioning reliably succeeds.
    folder: general
    interval: 1m
    rules:
      - uid: invenio_errors_any
        title: "InvenioRDM: Error logs detected"
        condition: B
        for: 2m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "Error/fatal/exception logs detected in Loki"
          description: 'Detected error-like log lines in the last 5 minutes. Query: sum(count_over_time({app=~".+"} |~ "(?i)(error|exception|traceback|fatal|panic)" [5m]))'
        labels:
          severity: warning
          source: loki
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 300
              to: 0
            model:
              editorMode: code
              expr: 'sum(count_over_time({app=~".+"} |~ "(?i)(error|exception|traceback|fatal|panic)" [5m]))'
              queryType: instant
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
