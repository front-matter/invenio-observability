global:
  scrape_interval: 15s

scrape_configs:
  - job_name: keycloak
    # Target uses the Docker network alias 'keycloak-production' defined in
    # the Keycloak production service compose (coolify network aliases).
    metrics_path: /metrics
    relabel_configs:
      - target_label: namespace
        replacement: keycloak
      - target_label: pod
        replacement: keycloak
      - target_label: container
        replacement: keycloak
    static_configs:
      - targets:
          - keycloak-production:9000

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis
    relabel_configs:
      - target_label: namespace
        replacement: redis
      - target_label: instance
        replacement: redis-exporter:9121
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: traefik
    static_configs:
      - targets:
          - coolify-proxy:9101
