# stored under /data/coolify/services/vector

[api]
enabled = true
address = "127.0.0.1:8686"

[sources.docker_logs]
type = "docker_logs"

# Explicitly set the Docker endpoint. This avoids surprises if the runtime
docker_host = "unix:///var/run/docker.sock"

# Exclude observability stack itself.
exclude_containers = [
	# NOTE: `exclude_containers` uses prefix matching (not glob patterns).
	"vector",
	"vector-",
	"victorialogs",
	"victorialogs-",
	"victoriametrics",
	"victoriametrics-",
	"grafana",
	"grafana-",
]

# Reduce noise: only collect logs for the relevant workloads.
# NOTE: `include_containers` uses prefix matching. If set, only matching
# containers are collected (unless excluded above).
include_containers = [
	"inveniordm-",
	"inveniordm-worker-",
	"coolify-proxy",
	"opensearch-",
	"valkey-",
	"postgres-",
	"keycloak-",
]

# IMPORTANT: `include_labels` on `docker_logs` is a *container filter* (expects
# `key=value` matches). It is NOT a “keep only these labels” allow-list.
#
# To avoid accidentally filtering out all containers (and getting 0 events), we
# do not set `include_labels` here. We prune `.container_labels` later in VRL
# instead.

# Merge Docker partial log frames automatically.
auto_partial_merge = true

# -------- GeoIP database --------

[enrichment_tables.geoip]
type = "geoip"
path = "/data/coolify/services/geoip/GeoLite2-City.mmdb"

[transforms.normalize]
type = "remap"
inputs = ["docker_logs"]

source = '''
container_name = string!(.container_name)
.container = replace(container_name, "/", "")

# Keep only selected Docker labels to control label cardinality.
# NOTE: Depending on the runtime (e.g. Coolify), labels may be exposed as
# `.label` instead of `.container_labels`.
labels_src = {}
if is_object(.container_labels) && (length(.container_labels) ?? 0) > 0 {
	labels_src = .container_labels
} else if is_object(.label) && (length(.label) ?? 0) > 0 {
	labels_src = .label
}

labels_out = {}
if is_object(labels_src) {
	labels_out."com.docker.compose.service" = labels_src."com.docker.compose.service"
	labels_out."com.docker.compose.project" = labels_src."com.docker.compose.project"
	labels_out."coolify.projectName" = labels_src."coolify.projectName"
	labels_out."coolify.environmentName" = labels_src."coolify.environmentName"
	labels_out."coolify.resourceName" = labels_src."coolify.resourceName"
	labels_out."environment" = labels_src."environment"
}

# Provide flattened label fields used by strict detection.
# Some runtimes expose labels as flattened fields already; in that case we keep them.
if !exists(.label_environment) && is_string(labels_src."environment") {
	.label_environment = labels_src."environment"
}
if !exists(.label_coolify_environmentName) && is_string(labels_src."coolify.environmentName") {
	.label_coolify_environmentName = labels_src."coolify.environmentName"
}
if !exists(.label_coolify_resourceName) && is_string(labels_src."coolify.resourceName") {
	.label_coolify_resourceName = labels_src."coolify.resourceName"
}
.container_labels = labels_out

compose_service = .container_labels."com.docker.compose.service"
.service = if is_null(compose_service) { .container } else { compose_service }

compose_project = .container_labels."com.docker.compose.project"
coolify_project = .container_labels."coolify.projectName"
.project = if !is_null(compose_project) { compose_project } else { coolify_project }

stream_value = .stream
.stream = if is_null(stream_value) { "stdout" } else { stream_value }

env_value = null

# Strict environment detection:
# Only use flattened label fields `label_environment` or `label_coolify_environmentName`.
# Ignore any other sources (including `.container_labels.*` fallbacks).
if exists(.label_environment) && is_string(.label_environment) { env_value = .label_environment }
if is_null(env_value) && exists(.label_coolify_environmentName) && is_string(.label_coolify_environmentName) {
	env_value = .label_coolify_environmentName
}

env_raw = ""
if is_string(env_value) { env_raw = downcase(string!(env_value)) }

.environment = if env_raw == "prod" || env_raw == "production" {
	"production"
} else if env_raw == "stage" || env_raw == "staging" {
	"staging"
} else if env_raw == "dev" || env_raw == "development" {
	"development"
} else {
	"unknown"
}
container_lc = downcase(.container)

# Component naming:
# - Primary: `label_coolify_resourceName` (set by Coolify; e.g. "web" → "inveniordm-web").
# - Fallback (plain Docker Compose): container name is used as-is.
resource_value = ""
if exists(.label_coolify_resourceName) && is_string(.label_coolify_resourceName) {
	resource_value = string!(.label_coolify_resourceName)
}

resource_lc = downcase(resource_value)
trim_match = parse_regex(resource_lc, r'^\s*(?P<v>.*?)\s*$') ?? null
if trim_match != null {
	resource_lc = string!(trim_match.v)
}

# With Coolify label: prefix + resource name (e.g. "inveniordm-web").
# Without Coolify label (plain Docker Compose): use the container name directly.
.component = if resource_lc != "" {
	if starts_with(container_lc, "inveniordm-worker-") {
		"inveniordm-worker-" + resource_lc
	} else if starts_with(container_lc, "inveniordm-") {
		"inveniordm-" + resource_lc
	} else {
		resource_lc
	}
} else {
	container_lc
}

# Detect log level (low cardinality). Works for common formats:
# - Traefik: level=info
# - OpenSearch: [..][INFO ]
# - Postgres: FATAL:, ERROR:, WARNING:
# - JSON logs: {"level":"info"}
msg = if is_string(.message) {
	.message
} else if is_string(.log) {
	.log
} else {
	""
}
level_raw = null

# Parse common HTTP access logs (combined format) to structured fields.
# Example:
# 172.18.0.2 - - [07/Mar/2026:13:00:41 +0000] "GET /static/favicon.ico HTTP/1.1" 200 0 "https://example.org/" "Mozilla/5.0 ..."
if msg != "" && starts_with(.component, "inveniordm-") {
	# Gunicorn structlog JSON access log — identified by event == "request".
	# Fields emitted by StructlogGunicornLogger.access() in gunicorn.conf.py:
	# {"event":"request","method":"GET","path":"/api","query":null,"status":200,
	#  "duration_ms":45.2,"remote_addr":"1.2.3.4","user_agent":"...",
	#  "request_id":"abc","bytes_sent":1234,"level":"info","logger":"gunicorn.access"}
	access_json = parse_json(msg) ?? null
	if is_object(access_json) && (to_string(access_json.event) ?? "") == "request" {
		method_raw = to_string(access_json.method) ?? ""
		status_code_json = to_int(access_json.status) ?? null
		path_raw = to_string(access_json.path) ?? ""

		# Only treat as access log when the key fields are present.
		if method_raw != "" && !is_null(status_code_json) && path_raw != "" {
			# remote_addr is HTTP_X_FORWARDED_FOR (preferred) or REMOTE_ADDR;
			# X-Forwarded-For can be a comma-separated list — keep the first entry.
			ip_raw = to_string(access_json.remote_addr) ?? ""
			if (!exists(.client_ip) || is_null(.client_ip) || (is_string(.client_ip) && string!(.client_ip) == "")) {
				if ip_raw != "" && ip_raw != "-" {
					ip_first = split(ip_raw, ",")[0]
					trim_match = parse_regex(ip_first, r'^\s*(?P<v>.*?)\s*$') ?? null
					ip_trim = if trim_match != null { string!(trim_match.v) } else { ip_first }
					if ip_trim != "" {
						.client_ip = ip_trim
					}
				}
			}

			if (!exists(.http_method) || is_null(.http_method) || (is_string(.http_method) && string!(.http_method) == "")) {
				.http_method = downcase(method_raw)
			}
			.http_status = status_code_json

			if (!exists(.http_target) || is_null(.http_target) || (is_string(.http_target) && string!(.http_target) == "")) {
				.http_target = path_raw
			}

			query_raw = to_string(access_json.query) ?? ""
			if (!exists(.http_url) || is_null(.http_url) || (is_string(.http_url) && string!(.http_url) == "")) {
				.http_url = if query_raw != "" {
					if starts_with(query_raw, "?") { path_raw + query_raw } else { path_raw + "?" + query_raw }
				} else {
					path_raw
				}
			}

			ua_raw = to_string(access_json.user_agent) ?? ""
			if (!exists(.user_agent) || is_null(.user_agent) || (is_string(.user_agent) && string!(.user_agent) == "")) {
				if ua_raw != "" && ua_raw != "-" {
					.user_agent = ua_raw
				}
			}

			rt_ms = to_float(access_json.duration_ms) ?? null
			if !is_null(rt_ms) { .duration_seconds = float!(rt_ms) / 1000.0 }

			req_id = to_string(access_json.request_id) ?? ""
			if req_id != "" { .request_id = req_id }

			bytes = to_int(access_json.bytes_sent) ?? null
			if !is_null(bytes) { .http_response_bytes = bytes }
		}
	}

	# For dashboards, treat "url" as the request URL/target (never the referer).
	if (!exists(.http_url) || is_null(.http_url) || (is_string(.http_url) && string!(.http_url) == "")) {
		if exists(.http_target) && is_string(.http_target) {
			.http_url = .http_target
		}
	}
}

# Ensure http_method is always present for inveniordm-* access logs.
if starts_with(.component, "inveniordm-") && (!exists(.http_method) || is_null(.http_method) || (is_string(.http_method) && string!(.http_method) == "")) {
	.http_method = "get"
}

# Provide a default for non-web logs so the Loki/VictoriaLogs label value
# isn't empty.
if !exists(.http_method) || is_null(.http_method) || (is_string(.http_method) && string!(.http_method) == "") {
	.http_method = "unknown"
}

# Truncate user-agent for dashboard display.
if starts_with(.component, "inveniordm-") && exists(.user_agent) && is_string(.user_agent) {
	ua_full = string!(.user_agent)
	if ua_full != "" {
		ua_short_match = parse_regex(ua_full, r'^(?P<ua>.{0,40})') ?? null
		if ua_short_match != null {
			.user_agent_short = string!(ua_short_match.ua)
		}
	}
}

if is_string(.level) {
	level_raw = .level
} else if is_object(.log) && is_string(.log.level) {
	level_raw = .log.level
} else {
	parsed_json = parse_json(msg) ?? null
	if is_object(parsed_json) && is_string(parsed_json.level) {
		level_raw = parsed_json.level
	} else {
		parsed = parse_regex(msg, r'(?i)\blevel=(?P<level>trace|debug|info|warn|warning|error|fatal|panic)\b') ?? null
		if parsed != null {
			level_raw = parsed.level
		} else {
			parsed = parse_regex(msg, r'(?i)^\[[^\]]+\]\[(?P<level>trace|debug|info|warn|warning|error|fatal)\s*\]') ?? null
			if parsed != null {
				level_raw = parsed.level
			} else {
				parsed = parse_regex(msg, r'(?i)\b(?P<level>log|info|notice|warning|error|fatal|panic):') ?? null
				if parsed != null {
					level_raw = parsed.level
				}
			}
		}
	}
}

level_norm = ""
if is_string(level_raw) { level_norm = downcase(string!(level_raw)) }
.severity = if level_norm == "warning" || level_norm == "warn" {
	"warn"
} else if level_norm == "notice" {
	"info"
} else if level_norm == "err" || level_norm == "error" {
	"error"
} else if level_norm == "crit" || level_norm == "critical" || level_norm == "alert" || level_norm == "emerg" {
	"fatal"
} else if level_norm == "panic" {
	"fatal"
} else if level_norm == "trace" || level_norm == "debug" || level_norm == "info" || level_norm == "error" || level_norm == "fatal" {
	level_norm
} else {
	"unknown"
}

# Access logs often don't contain an explicit level; infer it from HTTP status.
if .severity == "unknown" && starts_with(.component, "inveniordm-") {
	status_code = null
	if exists(.http_status) {
		status_code = to_int!(.http_status)
	} else {
		status_match = parse_regex(msg, r'"\s+(?P<status>\d{3})\s+') ?? null
		if status_match != null {
			status_code = to_int(status_match.status) ?? null
			if !is_null(status_code) { .http_status = status_code }
		}
	}
	if !is_null(status_code) {
		status_code_int = to_int(status_code)
		.severity = if status_code_int >= 500 {
			"error"
		} else if status_code_int >= 400 {
			"warn"
		} else if status_code_int > 0 {
			"info"
		} else {
			"unknown"
		}
	}
}

# Prevent Grafana from applying special log-level styling based on a JSON field
# named `level`. We keep the computed value in `.severity` instead.
if exists(.level) { del(.level) }

# Default: use Compose project name when available
app_raw = .project
.app = if is_string(app_raw) && app_raw != "" {
	app_raw
} else {
	"invenio-rdm"
}

# VictoriaLogs expects `_msg` as the primary log message field. Since we ship
# JSON-encoded events via Loki ingestion, ensure `_msg` is present so Grafana
# doesn't display the default "missing _msg field" placeholder.
if (!exists(._msg) || is_null(._msg) || (is_string(._msg) && string!(._msg) == "")) && msg != "" {
	parsed_json = parse_json(msg) ?? null
	if is_object(parsed_json) && is_string(parsed_json.event) {
		event_str = string!(parsed_json.event)
		# For gunicorn access logs, produce a concise summary rather than the bare "request" event.
		if event_str == "request" && exists(.http_method) && exists(.http_status) && exists(.http_target) {
			._msg = upcase(string!(.http_method)) + " " + string!(.http_target) + " " + to_string!(.http_status)
		} else {
			._msg = event_str
		}
	} else {
		._msg = msg
	}
}
'''

[transforms.geoip_enrich]
type = "remap"
inputs = ["normalize"]

source = '''
# GeoIP enrichment (safe): only for web-* components and only when we have a
# plausible IPv4 client IP.
component = to_string(.component) ?? ""
client_ip = to_string(.client_ip) ?? ""

if starts_with(component, "inveniordm-") {
	# Ensure the label exists for all inveniordm logs so Grafana variables like
	# `country=~".*"` don't drop events that have no GeoIP match.
	if (!exists(.country) || is_null(.country) || (is_string(.country) && string!(.country) == "")) {
		.country = "unknown"
	}

	if client_ip != "" {
	ip_match = parse_regex(client_ip, r'^(?P<ip>\d{1,3}(?:\.\d{1,3}){3})$') ?? null
	if ip_match != null {
		geo = get_enrichment_table_record("geoip", {"ip": ip_match.ip}) ?? null
		if geo != null {
			country = to_string(geo.country_name) ?? ""
			city = to_string(geo.city_name) ?? ""
			lat = to_float(geo.latitude) ?? null
			lon = to_float(geo.longitude) ?? null
			if country != "" { .country = country }
			if city != "" { .city = city }
			if lat != null { .latitude = lat }
			if lon != null { .longitude = lon }
		}
	}
	}
}

# Provide a default for non-web logs too, since `.country` is used as a Loki label.
if (!exists(.country) || is_null(.country) || (is_string(.country) && string!(.country) == "")) {
	.country = "unknown"
}
'''

[sinks.loki]
type = "loki"
inputs = ["geoip_enrich"]
endpoint = "http://victorialogs:9428/insert"
encoding.codec = "json"
encoding.except_fields = ["severity"]

[sinks.loki.labels]
app = "{{ app }}"
component = "{{ component }}"
environment = "{{ environment }}"
log_level = "{{ severity }}"
service = "{{ service }}"
container = "{{ container }}"
stream = "{{ stream }}"
country = "{{ country }}"
http_method = "{{ http_method }}"
