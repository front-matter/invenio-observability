global:
  scrape_interval: 15s

scrape_configs:
  - job_name: keycloak
    # Target is configured via KEYCLOAK_METRICS_TARGET env var on the vmagent
    # container (set in Coolify UI), e.g. keycloak-g4s80c4og8o84ckc4g0gkkwk:9000
    metrics_path: /metrics
    relabel_configs:
      - target_label: namespace
        replacement: keycloak
      - target_label: pod
        replacement: keycloak
      - target_label: container
        replacement: keycloak
    static_configs:
      - targets:
          - "%{KEYCLOAK_METRICS_TARGET}"

  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: redis
    relabel_configs:
      - target_label: namespace
        replacement: redis
      - target_label: instance
        replacement: redis-exporter:9121
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: postgres
    relabel_configs:
      - target_label: namespace
        replacement: postgres
      - target_label: instance
        replacement: postgres-exporter:9187
      - target_label: environment
        replacement: staging
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: traefik
    static_configs:
      - targets:
          - coolify-proxy:9101
