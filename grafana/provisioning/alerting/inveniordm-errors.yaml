apiVersion: 1

groups:
  - orgId: 1
    name: invenio-status-alerts
    # NOTE: `folder` is a *folder UID*, not the display name.
    # Use the default folder UID so provisioning reliably succeeds.
    folder: general
    interval: 1m
    rules:
      - uid: invenio_ping_down
        title: "InvenioRDM: Web down"
        condition: B
        for: 3m
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "Web monitor is down"
          description: 'monitor_status for monitor_name="InvenioRDM" has been 0 for 3 consecutive evaluations.'
        labels:
          severity: critical
          source: prometheus
        notification_settings:
          receiver: Front Matter
        data:
          - refId: A
            datasourceUid: victoriametrics
            relativeTimeRange:
              from: 180
              to: 0
            model:
              datasource:
                type: prometheus
                uid: victoriametrics
              editorMode: code
              expr: monitor_status{job="front-matter-status",monitor_name="InvenioRDM"}
              instant: true
              range: false
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: classic_conditions
              refId: B
              conditions:
                - type: query
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                    params: []
                  evaluator:
                    type: eq
                    params:
                      - 0
                  operator:
                    type: and
